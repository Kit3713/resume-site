# =============================================================
# CI + Container Registry Publishing
# Runs tests on every push/PR, publishes to GHCR on tags
# =============================================================

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # -----------------------------------------------------------
  # Quality Gate (fast-fail — runs before test suite)
  # Static analysis: ruff lint + format check, bandit security scan.
  # Every finding here fails the build — zero tolerance.
  # -----------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit vulture

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: bandit -r app/ -c pyproject.toml -ll

      - name: Vulture dead code detection
        run: vulture app/ manage.py vulture_allowlist.py --min-confidence 80
        continue-on-error: true  # Advisory — ratchet to blocking in v0.4.0

      - name: Check for unsafe SQL patterns
        run: |
          # Catch string formatting in SQL queries (f-strings, .format, %).
          # Parameterized queries use ? placeholders, never interpolation.
          if grep -rn "execute(f['\"]" app/ || grep -rn '\.format(' app/ | grep -i 'execute\|select\|insert\|update\|delete'; then
            echo "ERROR: Found string interpolation in SQL queries. Use parameterized queries (?) instead."
            exit 1
          fi

  # -----------------------------------------------------------
  # Test Suite
  # -----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pip-audit

      - name: Dependency audit
        run: pip-audit
        continue-on-error: true  # Advisory — don't block builds yet

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -----------------------------------------------------------
  # Container Build Verification (every push)
  # -----------------------------------------------------------
  container-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        # IMAGE_VERSION (Phase 21.1) labels the test image with the
        # commit SHA so a failed CI run is traceable back to source.
        run: |
          docker build \
            --build-arg IMAGE_VERSION="ci-${GITHUB_SHA::7}" \
            -t ${{ env.IMAGE_NAME }}:test \
            -f Containerfile .

      - name: Smoke test container
        run: |
          # Start container with minimal config
          cat > /tmp/config.yaml <<EOF
          secret_key: "ci-test-key-not-for-production"
          database_path: "/app/data/site.db"
          photo_storage: "/app/photos"
          admin:
            username: "admin"
            password_hash: "pbkdf2:sha256:600000$test$test"
          EOF

          docker run -d --name test-container \
            -p 8080:8080 \
            -v /tmp/config.yaml:/app/config.yaml:ro \
            ${{ env.IMAGE_NAME }}:test

          # Wait for startup
          sleep 5

          # Verify the landing page renders + both health endpoints respond.
          # /healthz is the lightweight liveness probe used by HEALTHCHECK;
          # /readyz (Phase 21.2) does the deeper DB/migration/disk/photos
          # check. CI must verify both so a regression in either probe is
          # caught before publish.
          curl -fsS http://localhost:8080/        || (docker logs test-container && exit 1)
          curl -fsS http://localhost:8080/healthz || (docker logs test-container && exit 1)
          curl -fsS http://localhost:8080/readyz  || (docker logs test-container && exit 1)

          # Cleanup
          docker stop test-container
          docker rm test-container

  # -----------------------------------------------------------
  # Container CVE Scan (Phase 21.3 — Trivy)
  #
  # Rebuilds the image fresh in this job (the container-build job's
  # daemon doesn't share with this runner) and scans for OS + Python
  # package vulnerabilities. Fails on HIGH or CRITICAL with an
  # available fix; unfixed CVEs are advisory only (operators can't
  # action what upstream hasn't patched). Secret-leak scanner runs
  # alongside the vuln scanner.
  # -----------------------------------------------------------
  container-scan:
    runs-on: ubuntu-latest
    needs: container-build
    steps:
      - uses: actions/checkout@v4

      - name: Build container image (for scanning)
        run: |
          docker build \
            --build-arg IMAGE_VERSION="ci-${GITHUB_SHA::7}" \
            -t ${{ env.IMAGE_NAME }}:scan \
            -f Containerfile .

      - name: Trivy vulnerability + secret scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln,secret'
          # Cache the vuln database between runs to keep scans fast.
          cache: 'true'

      - name: Upload SARIF for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # -----------------------------------------------------------
  # Publish to GHCR (tags only)
  # -----------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    # container-scan must pass before any image is pushed. This is the
    # CVE-gate side of the Phase 21.3 contract.
    needs: [test, container-build, container-scan]
    if: startsWith(github.ref, 'refs/tags/v')

    # `id-token: write` lets cosign request the OIDC token for keyless
    # signing (Phase 21.3). `contents: read` + `packages: write` retain
    # the existing checkout + GHCR push capabilities. These permissions
    # are job-scoped — workflow defaults stay tight.
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Phase 21.1: inject the version into the runtime stage so
          # the OCI label matches the git tag exactly.
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      # Phase 21.3 — keyless cosign signing.
      # Uses the GitHub Actions OIDC token (no keypair to manage) and
      # records the signature + certificate in the public Sigstore
      # transparency log. Operators verify with:
      #   cosign verify ghcr.io/<owner>/resume-site:vX.Y.Z \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     --certificate-identity-regexp 'https://github.com/Kit3713/resume-site/.+'
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          DIGEST="${{ steps.build_and_push.outputs.digest }}"
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

  # -----------------------------------------------------------
  # Publish rolling :main tag (every merge to main)
  # -----------------------------------------------------------
  publish-main:
    runs-on: ubuntu-latest
    needs: [test, container-build, container-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Same OIDC requirement as the tag-publish job — cosign keyless
    # signing needs id-token: write.
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push :main
        id: build_and_push_main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_VERSION=main-${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign :main image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          DIGEST="${{ steps.build_and_push_main.outputs.digest }}"
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
