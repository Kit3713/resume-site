# =============================================================
# CI + Container Registry Publishing
# Runs tests on every push/PR, publishes to GHCR on tags
# =============================================================

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # -----------------------------------------------------------
  # Quality Gate (fast-fail — runs before test suite)
  # Static analysis: ruff lint + format check, bandit security scan.
  # Every finding here fails the build — zero tolerance.
  # -----------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: bandit -r app/ -c pyproject.toml -ll

      - name: Check for unsafe SQL patterns
        run: |
          # Catch string formatting in SQL queries (f-strings, .format, %).
          # Parameterized queries use ? placeholders, never interpolation.
          if grep -rn "execute(f['\"]" app/ || grep -rn '\.format(' app/ | grep -i 'execute\|select\|insert\|update\|delete'; then
            echo "ERROR: Found string interpolation in SQL queries. Use parameterized queries (?) instead."
            exit 1
          fi

  # -----------------------------------------------------------
  # Test Suite
  # -----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pip-audit

      - name: Dependency audit
        run: pip-audit
        continue-on-error: true  # Advisory — don't block builds yet

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -----------------------------------------------------------
  # Container Build Verification (every push)
  # -----------------------------------------------------------
  container-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t ${{ env.IMAGE_NAME }}:test -f Containerfile .

      - name: Smoke test container
        run: |
          # Start container with minimal config
          cat > /tmp/config.yaml <<EOF
          secret_key: "ci-test-key-not-for-production"
          database_path: "/app/data/site.db"
          photo_storage: "/app/photos"
          admin:
            username: "admin"
            password_hash: "pbkdf2:sha256:600000$test$test"
          EOF

          docker run -d --name test-container \
            -p 8080:8080 \
            -v /tmp/config.yaml:/app/config.yaml:ro \
            ${{ env.IMAGE_NAME }}:test

          # Wait for startup
          sleep 5

          # Verify health
          curl -f http://localhost:8080/ || (docker logs test-container && exit 1)

          # Cleanup
          docker stop test-container
          docker rm test-container

  # -----------------------------------------------------------
  # Publish to GHCR (tags only)
  # -----------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [test, container-build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  # -----------------------------------------------------------
  # Publish rolling :main tag (every merge to main)
  # -----------------------------------------------------------
  publish-main:
    runs-on: ubuntu-latest
    needs: [test, container-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push :main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
