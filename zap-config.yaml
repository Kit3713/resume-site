# =============================================================
# OWASP ZAP Baseline Scan Configuration — Phase 13.9
#
# Consumed by .github/workflows/security-scan.yml via the
# ``rules_file_name: zap-config.yaml`` option on the
# zaproxy/action-baseline action.
#
# Format reference:
#   https://www.zaproxy.org/docs/docker/baseline-scan/#config-file
#
# Each line is of the form:
#   <rule_id>    <action>    (<description>)
#
# where <action> is one of:
#   IGNORE — finding is recorded in the HTML report but never fails
#            the build, even if severity is MEDIUM+. Use for
#            documented false positives AND for rules we've decided
#            not to fix (with a reason on the same line).
#   WARN   — recorded as LOW regardless of ZAP's internal severity.
#            Informational only; never fails the build.
#   FAIL   — recorded at its native severity. MEDIUM+ here fails
#            the build (per the allowlist filter in the workflow).
#
# WHY A SEPARATE ALLOWLIST FILE:
# -----------------------------
# A baseline scan of a fresh-out-of-the-box Flask app produces
# a handful of findings that are either structurally false
# positives (e.g. modern header rules flagging intentional
# absences) or things we've decided not to action for operational
# reasons. Checking them in lets a reviewer audit the full list
# without running ZAP themselves, and every IGNORE must carry a
# one-line justification next to it.
#
# When adding a new IGNORE, STATE THE REASON on the same line.
# A rule ID with no justification is a bug, not a policy.
# =============================================================

# --- Allowlisted (IGNORE) ---
