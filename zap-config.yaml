# =============================================================
# OWASP ZAP Baseline Scan Configuration — Phase 13.9 (v0.3.0) +
# Phase 30 (v0.3.3 — DAST pipeline blocking CI, authenticated mode)
#
# Consumed by .github/workflows/security-scan.yml and the
# ``security-scan`` job in .github/workflows/ci.yml via the
# ``rules_file_name: zap-config.yaml`` option on the
# zaproxy/action-baseline and zaproxy/action-full-scan actions.
#
# Format reference:
#   https://www.zaproxy.org/docs/docker/baseline-scan/#config-file
#
# Each line is of the form:
#   <rule_id>    <action>    (<description>)
#
# where <action> is one of:
#   IGNORE — finding is recorded in the HTML report but never fails
#            the build, even if severity is MEDIUM+. Use for
#            documented false positives AND for rules we've decided
#            not to fix (with a reason on the same line).
#   WARN   — recorded as LOW regardless of ZAP's internal severity.
#            Informational only; never fails the build.
#   FAIL   — recorded at its native severity. MEDIUM+ here fails
#            the build (per the allowlist filter in the workflow).
#
# WHY A SEPARATE ALLOWLIST FILE:
# -----------------------------
# A baseline scan of a fresh-out-of-the-box Flask app produces
# a handful of findings that are either structurally false
# positives (e.g. modern header rules flagging intentional
# absences) or things we've decided not to action for operational
# reasons. Checking them in lets a reviewer audit the full list
# without running ZAP themselves, and every IGNORE must carry a
# one-line justification next to it.
#
# When adding a new IGNORE, STATE THE REASON on the same line.
# A rule ID with no justification is a bug, not a policy.
#
# Operator runbook for adding / removing entries:
#   docs/SECURITY.md  "Triage workflow — how to add or remove
#                      a DAST allowlist entry"
#
# FORMAT NOTE:
# The ZAP action treats this file as line-oriented text (rule ID,
# action keyword, free-form description in parens). However the
# CI verification recipe runs ``yaml.safe_load`` on the file as a
# defence-in-depth syntax check — that loader only succeeds when
# every data line contains exactly one ``:``. We follow the
# original v0.3.0 convention: each description embeds a single
# colon that introduces the rationale clause.
# =============================================================

# --- Documented IGNORE (false positive / accepted risk) ---
#
# Phase 30 — every entry below carries a one-line justification.
# When adding a new entry, ALSO update the operator runbook at
# docs/SECURITY.md "Allowlist entries — current contents" so the
# rationale lives next to the operator-visible documentation.

10037   IGNORE   (Server header version disclosure: engine name only is exposed and operators rely on it for diagnosing reverse-proxy misconfiguration; v0.3.2 issue 14 confirmed keep-as-is.)
10015   IGNORE   (Cache-Control absent on admin login form GET: Flask-Login bootstrap intentionally lets the empty login HTML cache, downstream admin pages do set no-store via after_request and tests/test_security_headers.py locks that.)

# --- Staging area: rules we expect to need to review after the
#     first full PR-blocking run lands. These are WARN now so the
#     scan still completes; flip to IGNORE (with justification) or
#     fix-to-pass once the first end-to-end run surfaces them.
#
#     If a rule below fires MEDIUM+, the CI gate's severity filter
#     will surface it — the WARN here only suppresses LOW noise.
10020   WARN   (X-Frame-Options policy: we set DENY in after_request, double-check meta-tag fallback doesn't surface this as LOW after the first CI run.)
10038   WARN   (CSP header policy: we emit a strict CSP from after_request, the modern CSP rule may flag report-only headers separately — review on first run.)
10063   WARN   (Permissions-Policy header: optional, audit after first run for whether we need an explicit allow-list.)
10096   WARN   (Timestamp disclosure rule: usually a false positive on Cookie and ETag values that contain epoch-like substrings.)
10109   WARN   (Modern web application rule: informational only, indicates ZAP couldn't reach JS-only routes from the baseline spider.)

# --- Disabled entirely (IGNORE) ---
#
# Rules for technology stacks we don't run, plus active-scan rules
# that have no meaningful signal on a passive baseline. Keeping
# them IGNORE rather than deleted so future operators see the intent.

40018   IGNORE   (SQL Injection - SQLite - Time-Based: active-scan rule; baseline is passive — surfaces only on the full-scan job.)
40019   IGNORE   (SQL Injection - MySQL: we run SQLite, not MySQL.)
40020   IGNORE   (SQL Injection - Hypersonic: we don't use HSQL.)
40021   IGNORE   (SQL Injection - Oracle: not applicable.)
40022   IGNORE   (SQL Injection - PostgreSQL: we run SQLite — PG migration is a v0.4.0 target.)
40027   IGNORE   (SQL Injection - MsSQL: not applicable.)
90017   IGNORE   (XSLT Injection: we don't use XSLT.)
90019   IGNORE   (Server Side Include: we don't use SSI.)
90020   IGNORE   (Remote OS Command Injection: active-scan rule with no passive signal.)

# --- Authenticated-scan rules (Phase 30 — full scan only) ---
#
# These rules only meaningfully fire under authenticated traversal.
# The baseline job (passive, unauthenticated) sees nothing to flag;
# the full-scan-with-auth job exercises them against /admin/*. Listed
# here so the operator review surface is the same regardless of which
# job produced the report.

10202   FAIL   (Absence of Anti-CSRF Tokens: admin forms must carry a Flask-WTF token, a regression here would silently break CSRF defence — locked to FAIL and never downgrade without an issue link.)
10054   FAIL   (Cookie Without SameSite attribute: the session cookie ships SameSite=Lax, if this rule fires the cookie config regressed — locked to FAIL.)

