# resume-site configuration
# Copy this file to config.yaml and edit with your settings.
# config.yaml is gitignored — never commit it.

# Required: generate a random key (e.g., python -c "import secrets; print(secrets.token_hex(32))")
secret_key: "CHANGE-ME-generate-a-random-key"

# Database location (relative to project root, or absolute path)
database_path: "data/site.db"

# Photo storage directory
photo_storage: "photos"

# Mark the session cookie as Secure (HTTPS-only). Set to false for local
# plain-HTTP development; keep true in production behind HTTPS.
session_cookie_secure: true

# Phase 22.6 — reverse-proxy IP allowlist.
#
# List the CIDR ranges your reverse proxy lives in. When populated, the
# admin route will trust ``X-Forwarded-For`` ONLY for inbound TCP
# connections whose peer IP falls inside one of these networks. Direct
# inbound requests (no proxy) are always judged by ``remote_addr``.
#
# Leave empty ([]) when the app is exposed directly — XFF will then be
# ignored and the admin IP allowlist is evaluated against the raw
# remote_addr. For a typical Caddy-on-the-same-host deployment,
# "127.0.0.0/8" is the right entry.
#
# The shared extraction across all five IP-trust callsites (contact
# rate limit, API rate limit, analytics, /metrics gate, login throttle)
# lands in v0.3.2 Phase 23.2 — issue #34.
trusted_proxies: []

# SMTP relay for contact form emails
smtp:
  host: "smtp.gmail.com"
  port: 587
  user: "your@email.com"
  password: "app-password"
  # Optional: decouple the From header from the SMTP login identity.
  # Needed for relay providers where you authenticate as a fixed
  # service user but must send from your own verified domain:
  #   Resend   → user: "resend",   from_address: "contact@yourdomain.com"
  #   SendGrid → user: "apikey",   from_address: "contact@yourdomain.com"
  #   Mailgun  → user: "postmaster@mg.yourdomain.com", from_address: "contact@yourdomain.com"
  # When unset, from_address falls back to `user` — no change for
  # Gmail / Outlook / self-hosted Postfix setups.
  # from_address: "contact@yourdomain.com"
  recipient: "your@email.com"

# Admin panel access
admin:
  username: "admin"
  # Generate with: python manage.py hash-password
  password_hash: ""
  # IP networks allowed to access /admin (CIDR notation)
  allowed_networks:
    - "127.0.0.0/8"
    - "10.0.0.0/8"
    - "192.168.0.0/16"
    - "100.64.0.0/10"    # Tailscale
