# =============================================================
# resume-site compose.yaml
# Works with both `podman compose` and `docker compose`
#
# Usage:
#   1. Copy config.example.yaml to config.yaml and edit
#   2. podman compose up -d
#   3. podman compose exec resume-site python manage.py init-db
#   4. Access admin at http://localhost:8080/admin
#
# With Caddy (HTTPS):
#   1. Uncomment the caddy service and caddy volumes below
#   2. Edit the Caddyfile with your domain
#   3. podman compose up -d
# =============================================================

services:
  resume-site:
    image: ghcr.io/kit3713/resume-site:latest
    container_name: resume-site
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro,Z
      - resume-site-data:/app/data:Z
      - resume-site-photos:/app/photos:Z
      - resume-site-backups:/app/backups:Z
    environment:
      # Tell `manage.py backup` to write archives into the mounted
      # volume so they survive container rebuilds and can be picked up
      # by host-side offsite-sync jobs (rsync, rclone, etc.).
      RESUME_SITE_BACKUP_DIR: /app/backups
    # Uncomment to use Podman secrets for SMTP password:
    # secrets:
    #   - smtp_password
    # Liveness probe: /healthz is intentionally lightweight (no I/O,
    # no DB) so a transient SQLite write lock or slow disk can't make
    # the orchestrator kill the container. Use /readyz (Phase 21.2) for
    # a real "can it serve requests right now?" check — see the
    # commented Kubernetes readiness probe block below.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # --- Kubernetes-style probes (uncomment when running under K8s/Nomad) ---
    # Compose itself only supports a single healthcheck (the liveness one
    # above). The block below documents the readiness contract the
    # ``/readyz`` endpoint exposes — k8s manifests should mirror it
    # verbatim so the orchestrator pulls the pod from the LB rotation when
    # the database is unreachable, migrations are pending, the photos
    # directory is unwritable, or disk space is critically low.
    #
    # readinessProbe:
    #   httpGet:
    #     path: /readyz
    #     port: 8080
    #   initialDelaySeconds: 5
    #   periodSeconds: 10
    #   timeoutSeconds: 3
    #   failureThreshold: 3
    # livenessProbe:
    #   httpGet:
    #     path: /healthz
    #     port: 8080
    #   initialDelaySeconds: 10
    #   periodSeconds: 30
    #   timeoutSeconds: 5
    #   failureThreshold: 3

  # --- Optional: Caddy reverse proxy for automatic HTTPS ---
  # Uncomment and create a Caddyfile with your domain:
  #
  #   portfolio.yourdomain.com {
  #       reverse_proxy resume-site:8080
  #   }
  #
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "443:443/udp"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     - resume-site

volumes:
  resume-site-data:
  resume-site-photos:
  resume-site-backups:
  # caddy-data:
  # caddy-config:

